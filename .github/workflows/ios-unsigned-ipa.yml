name: iOS Unsigned IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "ios/**"
      - "scripts/build_ios_unsigned.sh"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "vite.config.ts"
      - "index.html"
      - "tsconfig.json"

jobs:
  build-ios-unsigned:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d "ios/App" ]; then
            npm run ios:init
          fi

      - name: Build unsigned IPA
        run: bash scripts/build_ios_unsigned.sh

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafaygen-ai-agent-ios-unsigned
          path: |
            release-artifacts/ios/rafaygen-ai-agent-unsigned.ipa
            release-artifacts/ios/SHA256SUMS-ios.txt
          if-no-files-found: error
          retention-days: 14
