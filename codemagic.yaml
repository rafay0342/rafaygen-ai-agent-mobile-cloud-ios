workflows:
  ios-unsigned-ipa:
    name: iOS Unsigned IPA Build (Free)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.12.0
      xcode: latest

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build unsigned IPA
        script: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            TARGET=(-workspace App.xcworkspace)
          else
            TARGET=(-project App.xcodeproj)
          fi
          mkdir -p ../../release-artifacts/ios
          xcodebuild \
            "${TARGET[@]}" \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath build/ \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          APP_PATH=$(find build/ -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../../release-artifacts/ios/rafaygen-ai-agent-unsigned.ipa Payload/
          rm -rf Payload
          ls -lh ../../release-artifacts/ios/

    artifacts:
      - release-artifacts/ios/*.ipa
